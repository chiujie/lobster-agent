<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🦞 Lobster AI Chatbot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .chat-container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
      width: 100%;
      max-width: 700px;
      display: flex;
      flex-direction: column;
      height: 90vh;
      overflow: hidden;
    }

    .chat-header {
      background: linear-gradient(135deg, #c0392b, #e74c3c);
      color: #fff;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-header h1 {
      font-size: 1.3rem;
      font-weight: 600;
    }

    .chat-header span.emoji {
      font-size: 2rem;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 18px;
      line-height: 1.5;
      word-break: break-word;
      white-space: pre-wrap;
      font-size: 0.95rem;
    }

    .message.user {
      align-self: flex-end;
      background: #e74c3c;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.bot {
      align-self: flex-start;
      background: #f0f4f8;
      color: #2d3748;
      border-bottom-left-radius: 4px;
    }

    .message.error {
      align-self: flex-start;
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffc107;
    }

    .typing-indicator {
      align-self: flex-start;
      display: flex;
      gap: 6px;
      padding: 14px 18px;
      background: #f0f4f8;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: #a0aec0;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .chat-input-area {
      padding: 16px 24px;
      border-top: 1px solid #e2e8f0;
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      resize: none;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      max-height: 120px;
      line-height: 1.5;
    }

    #user-input:focus {
      border-color: #e74c3c;
    }

    #send-btn {
      background: #e74c3c;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }

    #send-btn:hover:not(:disabled) {
      background: #c0392b;
    }

    #send-btn:active:not(:disabled) {
      transform: scale(0.97);
    }

    #send-btn:disabled {
      background: #a0aec0;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <span class="emoji">🦞</span>
      <h1>Lobster AI Chatbot</h1>
    </div>

    <div class="chat-messages" id="chat-messages">
      <div class="message bot">Hi! I'm Lobster, your AI assistant. How can I help you today?</div>
    </div>

    <div class="chat-input-area">
      <textarea
        id="user-input"
        placeholder="Type your message…"
        rows="1"
        autofocus
      ></textarea>
      <button id="send-btn">Send ➤</button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('chat-messages');
    const inputEl = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function appendMessage(text, role) {
      const div = document.createElement('div');
      div.classList.add('message', role);
      div.textContent = text;
      messagesEl.appendChild(div);
      scrollToBottom();
      return div;
    }

    function showTyping() {
      const indicator = document.createElement('div');
      indicator.classList.add('typing-indicator');
      indicator.innerHTML = '<span></span><span></span><span></span>';
      messagesEl.appendChild(indicator);
      scrollToBottom();
      return indicator;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      appendMessage(text, 'user');
      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;

      const typingEl = showTyping();

      try {
        const response = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text }),
        });
        const data = response.headers.get('content-type')?.includes('application/json')
          ? await response.json()
          : { error: 'Unexpected server response. Please try again.' };
        typingEl.remove();

        if (data.reply) {
          appendMessage(data.reply, 'bot');
        } else {
          appendMessage(data.error || 'Something went wrong. Please try again.', 'error');
        }
      } catch (err) {
        typingEl.remove();
        appendMessage('Network error. Please check your connection.', 'error');
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Auto-resize textarea
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });
  </script>
</body>
</html>
