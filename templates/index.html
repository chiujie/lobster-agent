<!DOCTYPE html>
<html>
<head>
    <title>🦞 AI 龍蝦 Agent</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            text-align: center;
            padding: 40px;
        }
        input {
            width: 60%;
            padding: 10px;
            border-radius: 10px;
            border: none;
        }
        button {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            background: #38bdf8;
            color: black;
            cursor: pointer;
        }
        #chat {
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
            text-align: left;
            padding: 10px;
            border: 1px solid #38bdf8;
            border-radius: 10px;
            background: #1e293b;
        }
        .msg {
            margin: 10px 0;
        }
        .user { color: #facc15; }
        .lobster { color: #38bdf8; }
        .thinking { color: #94a3b8; font-style: italic; }
    </style>
</head>
<body>

<h1>🦞 AI 龍蝦 Agent</h1>

<input id="msg" placeholder="問龍蝦任何問題..." />
<button onclick="send()">送出</button>

<div id="chat"></div>

<script>
async function send() {
    let input = document.getElementById("msg");
    let chat = document.getElementById("chat");

    let userText = input.value;
    if (!userText.trim()) return;

    // 顯示使用者訊息
    chat.innerHTML += `<div class="msg user">👤 ${userText}</div>`;

    // 顯示思考中提示
    let thinkingMsg = document.createElement("div");
    thinkingMsg.className = "msg thinking";
    thinkingMsg.innerText = "🦞 🦞 龍蝦暫時思考中，請稍後再試...";
    chat.appendChild(thinkingMsg);

    // 自動滾動到底部
    chat.scrollTop = chat.scrollHeight;

    // 送到後端
    let res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: userText})
    });

    let data = await res.json();

    // 移除思考提示
    thinkingMsg.remove();

    // 顯示 AI 回覆
    chat.innerHTML += `<div class="msg lobster">🦞 ${data.reply}</div>`;

    // 滾動到底部
    chat.scrollTop = chat.scrollHeight;

    input.value = "";
}
</script>

</body>
</html>
